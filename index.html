<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026年7月 日程表</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
background:#f2f2f7;color:#000;min-height:100vh
}
.app{max-width:520px;margin:0 auto;background:#fff;min-height:100vh;border-radius:0;overflow:hidden}
/* Header */
header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 8px;background:#fff}
header h1{font-size:22px;font-weight:700;color:#000}
.nav-btns{display:flex;gap:4px}
.nav-btns button{width:36px;height:36px;border:none;background:none;font-size:18px;color:#007AFF;cursor:pointer;border-radius:50%;display:flex;align-items:center;justify-content:center}
.nav-btns button:hover{background:rgba(0,122,255,.1)}
.add-btn{height:32px;padding:0 14px;font-size:14px;color:#fff;border:none;border-radius:16px;background:#007AFF;cursor:pointer;font-weight:500;white-space:nowrap}
.add-btn:hover{opacity:.85}
/* Weekdays */
.weekdays{display:grid;grid-template-columns:repeat(7,1fr);padding:4px 12px}
.weekdays div{text-align:center;padding:6px 0;font-size:11px;font-weight:500;color:#8e8e93}
.weekdays div:first-child,.weekdays div:last-child{color:#ff3b30}
/* Days grid */
.days-grid{display:grid;grid-template-columns:repeat(7,1fr);padding:0 8px 8px}
.day-cell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:50%;position:relative;font-size:15px;color:#000;font-weight:400;margin:1px}
.day-cell:hover{background:rgba(0,122,255,.1)}
.day-cell.other-month{color:#c7c7cc}
.day-cell.today{font-weight:700}
.day-cell.today::after{content:'';position:absolute;bottom:4px;width:5px;height:5px;background:#ff3b30;border-radius:50%}
.day-cell.selected{background:#007AFF;color:#fff;font-weight:600}
.day-cell.selected.today::after{background:#fff}
.day-cell.has-events::before{content:'';position:absolute;top:3px;width:4px;height:4px;background:#007AFF;border-radius:50%}
.day-cell.selected.has-events::before{background:#fff}
.day-cell.selected.today{font-weight:700}
/* Divider */
.divider{height:1px;background:#e5e5ea;margin:0 16px}
/* Agenda section */
.agenda{padding:12px 16px}
.agenda-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.agenda-header h2{font-size:17px;font-weight:600;color:#000}
.agenda-header span{font-size:13px;color:#8e8e93}
.event-count{font-size:13px;color:#8e8e93}
/* Time section */
.time-section{margin-top:12px}
.time-section-label{font-size:12px;font-weight:600;color:#8e8e93;text-transform:uppercase;margin-bottom:6px;padding-left:2px}
.time-events{display:flex;flex-direction:column;gap:6px}
/* Event item */
.event-item{display:flex;align-items:center;padding:12px 14px;border-radius:10px;background:#f8f8f8;cursor:pointer;transition:background .15s;position:relative}
.event-item:hover{background:#f0f0f5}
.event-item .time-dot{width:10px;height:10px;border-radius:50%;margin-right:10px;flex-shrink:0}
.event-item .time-dot.blue{background:#007AFF}
.event-item .time-dot.red{background:#ff3b30}
.event-item .event-info{flex:1;min-width:0}
.event-item .event-title{font-size:15px;color:#000;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.event-item .event-time{font-size:12px;color:#8e8e93;margin-top:2px}
.event-item .delete-icon{width:24px;height:24px;border-radius:50%;background:rgba(0,0,0,.1);color:#666;display:none;align-items:center;justify-content:center;cursor:pointer;font-size:12px;flex-shrink:0;margin-left:8px}
.event-item:hover .delete-icon{display:flex}
.event-item .delete-icon:hover{background:rgba(255,59,48,.15);color:#ff3b30}
/* No events */
.no-events{text-align:center;color:#c7c7cc;font-size:14px;padding:20px 0}
/* Hint */
.hint{padding:8px 16px 16px;font-size:11px;color:#c7c7cc;text-align:center;line-height:1.5}
/* Modal overlay */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;justify-content:center;align-items:flex-end;padding:10px 0}
.modal-overlay.active{display:flex}
@media(min-width:641px){.modal-overlay{align-items:center}}
.modal{background:#fff;border-radius:16px 16px 0 0;padding:20px 16px 16px;width:100%;max-width:420px;max-height:85vh;max-height:85dvh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 -4px 24px rgba(0,0,0,.15)}
@media(min-width:641px){.modal{border-radius:12px;padding:24px 24px 20px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,.2)}}
@media(max-width:640px){.modal{max-height:75vh;max-height:75dvh}}
.modal h3{font-size:17px;font-weight:600;margin-bottom:16px;color:#000}
.modal-body{overflow-y:auto;flex:1;margin-bottom:8px}
.modal label{display:block;font-size:13px;color:#8e8e93;margin-bottom:4px;font-weight:500}
.modal-body input,.modal-body select{width:100%;padding:10px 12px;border:1px solid #e5e5ea;border-radius:8px;font-size:15px;margin-bottom:12px;font-family:inherit;background:#f8f8f8}
.modal-body input:focus{border-color:#007AFF;outline:none;background:#fff}
.title-input-row{display:flex;gap:6px;align-items:center}
.title-input-row input{flex:1;margin-bottom:12px}
.voice-btn{width:40px;height:40px;border-radius:50%;border:1px solid #e5e5ea;background:#f8f8f8;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;margin-bottom:12px}
.voice-btn:hover{background:#e8f0fe;border-color:#007AFF}
.voice-btn.listening{background:#ff3b30;color:#fff;border-color:#ff3b30;animation:pulse .8s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,59,48,.4)}50%{box-shadow:0 0 0 8px rgba(255,59,48,0)}}
.voice-btn.unsupported{opacity:.4;cursor:not-allowed}
.modal .checkbox-row{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.modal .checkbox-row input{width:auto;margin-bottom:0;accent-color:#007AFF}
.modal .checkbox-row label{margin-bottom:0;font-size:15px;color:#000;font-weight:400}
.modal .time-row{display:flex;gap:8px}
.modal .time-row input{flex:1;margin-bottom:12px;text-align:center}
.modal .btn-row{display:flex;gap:8px;margin-top:12px;flex-shrink:0;background:#fff;padding-top:8px;border-top:1px solid #e5e5ea}
.modal .btn-row button{flex:1;padding:12px;border-radius:10px;font-size:15px;cursor:pointer;border:1px solid #e5e5ea;background:#fff;font-family:inherit;font-weight:500}
.modal .btn-save{background:#007AFF;color:#fff;border-color:#007AFF}
.modal .btn-delete{background:#ff3b30;color:#fff;border-color:#ff3b30}
.modal .btn-delete.hidden{display:none}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 24px;border-radius:8px;font-size:14px;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="app">
<header>
<div class="nav-btns"><button id="prevBtn">&#9664;</button><button id="nextBtn">&#9654;</button></div>
<h1 id="monthTitle">2026年7月</h1>
<button class="add-btn" id="addBtn">+ 新增</button>
</header>
<div class="weekdays"><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div><div>日</div></div>
<div class="days-grid" id="daysGrid"></div>
<div class="divider"></div>
<div class="agenda" id="agenda">
<div class="agenda-header"><h2 id="agendaDate">7月8日 周三</h2></div>
<div class="time-section"><div class="time-section-label">上午</div><div class="time-events" id="morningEvents"><div class="no-events">无日程</div></div></div>
<div class="time-section"><div class="time-section-label">下午</div><div class="time-events" id="afternoonEvents"><div class="no-events">无日程</div></div></div>
<div class="time-section"><div class="time-section-label">全天</div><div class="time-events" id="allDayEvents"><div class="no-events">无日程</div></div></div>
</div>
</div>
<div class="hint">点击日期查看日程 · 点击"新增"添加事件 · Ctrl+Shift+R 恢复默认</div>
<!-- Modal -->
<div class="modal-overlay" id="modal">
<div class="modal">
<h3 id="modalTitle">新增事件</h3>
<div class="modal-body">
<label>标题</label><div class="title-input-row"><input type="text" id="evtTitle" placeholder="例如：开会"><button type="button" id="voiceBtn" class="voice-btn" title="语音输入">🎤</button></div>
<label>日期</label><input type="date" id="evtDate">
<div class="checkbox-row"><input type="checkbox" id="evtAllDay"><label for="evtAllDay">全天事件</label></div>
<div class="time-row" id="timeRow"><input type="time" id="evtTimeStart" value="09:00"><input type="time" id="evtTimeEnd" value="10:00"></div>
</div>
<div class="btn-row">
<button class="btn-delete hidden" id="btnDelete">删除</button>
<button id="btnCancel">取消</button>
<button class="btn-save" id="btnSave">确认</button>
</div>
</div></div>
<div class="toast" id="toast"></div>
<script>
// ---------- Event Data ----------
var defaultEvents=[
{id:1,date:"2026-07-06",title:"述职答辩",allDay:false,time:"13:00-17:00"},
{id:2,date:"2026-07-06",title:"西语课",allDay:false,time:"19:00-20:00"},
{id:3,date:"2026-07-07",title:"完成注会作业",allDay:true,time:""},
{id:4,date:"2026-07-07",title:"完成开题答辩PPT",allDay:true,time:""},
{id:5,date:"2026-07-07",title:"普拉提",allDay:false,time:"18:00-19:00"},
{id:6,date:"2026-07-09",title:"普拉提",allDay:false,time:"18:30-19:30"},
{id:7,date:"2026-07-10",title:"注会作业",allDay:true,time:""},
{id:8,date:"2026-07-11",title:"香港账户整理",allDay:false,time:"9:00-13:00"},
{id:9,date:"2026-07-12",title:"开题答辩",allDay:true,time:""},
{id:10,date:"2026-07-16",title:"西安活动",allDay:true,time:""}
];
var events=[],stored=localStorage.getItem("schedule_events");
if(stored){events=JSON.parse(stored)}else{events=defaultEvents;localStorage.setItem("schedule_events",JSON.stringify(events))}
var nextId=events.length>0?Math.max.apply(null,events.map(function(e){return e.id}))+1:1;
function saveEvents(){localStorage.setItem("schedule_events",JSON.stringify(events))}
var eventMap={};
function buildMap(){eventMap={};events.forEach(function(e){if(!eventMap[e.date])eventMap[e.date]=[];eventMap[e.date].push(e)})}
var currentYear=2026,currentMonth=7,selectedDate="";
var monthTitle=document.getElementById("monthTitle"),daysGrid=document.getElementById("daysGrid");
var agenda=document.getElementById("agenda"),agendaDate=document.getElementById("agendaDate");
var modal=document.getElementById("modal"),modalTitle=document.getElementById("modalTitle");
var evtTitle=document.getElementById("evtTitle"),evtDate=document.getElementById("evtDate");
var evtAllDay=document.getElementById("evtAllDay"),timeRow=document.getElementById("timeRow");
var evtTimeStart=document.getElementById("evtTimeStart"),evtTimeEnd=document.getElementById("evtTimeEnd");
var btnDelete=document.getElementById("btnDelete"),btnSave=document.getElementById("btnSave");
var btnCancel=document.getElementById("btnCancel"),voiceBtn=document.getElementById("voiceBtn"),toastEl=document.getElementById("toast"),editingId=null;

function showToast(msg){toastEl.textContent=msg;toastEl.classList.add("show");setTimeout(function(){toastEl.classList.remove("show")},2000)}

function todayStr(){var d=new Date();function p(n){return n<10?"0"+n:n};return d.getFullYear()+"-"+p(d.getMonth()+1)+"-"+p(d.getDate())}

var weekNames=["日","一","二","三","四","五","六"];
function render(){
buildMap();monthTitle.textContent=currentYear+"年"+currentMonth+"月";daysGrid.innerHTML="";
var fd=new Date(currentYear,currentMonth-1,1),sd=fd.getDay()===0?7:fd.getDay();
var dim=new Date(currentYear,currentMonth,0).getDate(),dip=new Date(currentYear,currentMonth-1,0).getDate();
var td=todayStr(),ts=selectedDate||td;
function pp(n){return n<10?"0"+n:n}
var i,d,m,y,ds;
for(i=sd-1;i>0;i--){d=dip-i+1;m=currentMonth===1?12:currentMonth-1;y=currentMonth===1?currentYear-1:currentYear;ds=y+"-"+pp(m)+"-"+pp(d);appendDay(d,ds,true)}
for(d=1;d<=dim;d++){ds=currentYear+"-"+pp(currentMonth)+"-"+pp(d);appendDay(d,ds,false)}
var tc=sd-1+dim,rm=tc%7===0?0:7-(tc%7),nm=currentMonth===12?1:currentMonth+1,ny=currentMonth===12?currentYear+1:currentYear;
for(d=1;d<=rm;d++){ds=ny+"-"+pp(nm)+"-"+pp(d);appendDay(d,ds,true)}
updateAgenda(ts);
}

function appendDay(dn,ds,om){
var c=document.createElement("div");c.className="day-cell";if(om)c.classList.add("other-month");
if(ds===todayStr())c.classList.add("today");
var de=eventMap[ds]||[];if(de.length>0)c.classList.add("has-events");
if(ds===selectedDate)c.classList.add("selected");
c.setAttribute("data-date",ds);
c.addEventListener("click",function(){selectedDate=ds;render();if(ds===todayStr())selectedDate="";});
var ne=document.createElement("span");ne.textContent=dn;c.appendChild(ne);
daysGrid.appendChild(c);
}

function updateAgenda(ds){
var d=new Date(ds+"T00:00:00");
agendaDate.textContent=(d.getMonth()+1)+"月"+d.getDate()+"日 周"+weekNames[d.getDay()];
var de=eventMap[ds]||[];
var morning=[],afternoon=[],allday=[];
de.forEach(function(ev){
if(ev.allDay){allday.push(ev)}else{var h=parseInt(ev.time.split(":")[0]);if(h<12){morning.push(ev)}else{afternoon.push(ev)}}
});
renderEventList("morningEvents",morning);
renderEventList("afternoonEvents",afternoon);
renderEventList("allDayEvents",allday);
}

function renderEventList(id,list){
var el=document.getElementById(id);el.innerHTML="";
if(list.length===0){el.innerHTML='<div class="no-events">无日程</div>';return}
list.forEach(function(ev){
var item=document.createElement("div");item.className="event-item";
var dot=document.createElement("span");dot.className="time-dot "+(ev.allDay?"blue":"red");item.appendChild(dot);
var info=document.createElement("div");info.className="event-info";
var title=document.createElement("div");title.className="event-title";title.textContent=ev.title;info.appendChild(title);
if(!ev.allDay){var tm=document.createElement("div");tm.className="event-time";tm.textContent=ev.time;info.appendChild(tm)}
item.appendChild(info);
var del=document.createElement("span");del.className="delete-icon";del.textContent="×";
del.addEventListener("click",function(e){e.stopPropagation();deleteEvent(ev.id)});
item.appendChild(del);
item.addEventListener("click",function(){openEditModal(ev)});
el.appendChild(item);
});
}

function openAddModal(ds){editingId=null;modalTitle.textContent="新增事件";btnSave.textContent="确认";evtTitle.value="";evtDate.value=ds||todayStr();evtAllDay.checked=false;evtTimeStart.value="09:00";evtTimeEnd.value="10:00";timeRow.style.display="flex";btnDelete.classList.add("hidden");modal.classList.add("active")}
function openEditModal(ev){editingId=ev.id;modalTitle.textContent="编辑事件";btnSave.textContent="确认修改";evtTitle.value=ev.title;evtDate.value=ev.date;evtAllDay.checked=ev.allDay;if(ev.allDay){timeRow.style.display="none";evtTimeStart.value="09:00";evtTimeEnd.value="10:00"}else{timeRow.style.display="flex";var p=ev.time?ev.time.split("-"):["09:00","10:00"];evtTimeStart.value=p[0]||"09:00";evtTimeEnd.value=p[1]||"10:00"}btnDelete.classList.remove("hidden");modal.classList.add("active")}
function saveEvent(){var t=evtTitle.value.trim();if(!t){alert("请输入事件标题");return}var dt=evtDate.value,ad=evtAllDay.checked,tm=ad?"":(evtTimeStart.value+"-"+evtTimeEnd.value);if(editingId){var ev=events.find(function(e){return e.id===editingId});if(ev){ev.title=t;ev.date=dt;ev.allDay=ad;ev.time=tm}}else{events.push({id:nextId++,date:dt,title:t,allDay:ad,time:tm})}saveEvents();closeModal();selectedDate=dt;render();showToast(editingId?"事件已更新":"事件已添加")}
function deleteEvent(id){events=events.filter(function(e){return e.id!==id});saveEvents();render();closeModal()}
function closeModal(){modal.classList.remove("active");editingId=null}
evtAllDay.addEventListener("change",function(){timeRow.style.display=evtAllDay.checked?"none":"flex"});
btnSave.addEventListener("click",saveEvent);btnCancel.addEventListener("click",closeModal);
btnDelete.addEventListener("click",function(){if(editingId&&confirm("确定删除这个事件吗？")){deleteEvent(editingId)}});
modal.addEventListener("click",function(e){if(e.target===modal)closeModal()});
document.getElementById("addBtn").addEventListener("click",function(){openAddModal("")});
document.getElementById("prevBtn").addEventListener("click",function(){if(currentMonth===1){currentMonth=12;currentYear--}else{currentMonth--}render()});
document.getElementById("nextBtn").addEventListener("click",function(){if(currentMonth===12){currentMonth=1;currentYear++}else{currentMonth++}render()});
document.addEventListener("keydown",function(e){if(e.ctrlKey&&e.shiftKey&&e.key==="R"){if(confirm("恢复默认事件？")){events=defaultEvents;saveEvents();render()}}});
// Handle mobile keyboard overlay
var inputs=modal.querySelectorAll("input");inputs.forEach(function(inp){inp.addEventListener("focus",function(){if(window.innerWidth<641){modal.parentElement.style.alignItems="flex-start"}});inp.addEventListener("blur",function(){if(window.innerWidth<641){modal.parentElement.style.alignItems="flex-end"}})});
// ---------- Voice Recognition ----------
function parseVoiceDate(text){
var d=new Date();var dateStr="";var timeStart="";var timeEnd="";var title=text;
var r=/明天/.exec(title);if(r){d.setDate(d.getDate()+1);title=title.replace("明天","")}
r=/后天/.exec(title);if(r){d.setDate(d.getDate()+2);title=title.replace("后天","")}
r=/大后天/.exec(title);if(r){d.setDate(d.getDate()+3);title=title.replace("大后天","")}
r=/今天/.exec(title);if(r){title=title.replace("今天","")}
r=/下周(一|二|三|四|五|六|日|天)/.exec(title);if(r){var wd={"一":1,"二":2,"三":3,"四":4,"五":5,"六":6,"日":0,"天":0};var tw=wd[r[1]];var cd=d.getDay();var dd=(7-cd+tw)%7||7;d.setDate(d.getDate()+dd);title=title.replace(r[0],"")}
r=/下星期(一|二|三|四|五|六|日|天)/.exec(title);if(r){var wd2={"一":1,"二":2,"三":3,"四":4,"五":5,"六":6,"日":0,"天":0};var tw2=wd2[r[1]];var cd2=d.getDay();var dd2=(7-cd2+tw2)%7||7;d.setDate(d.getDate()+dd2);title=title.replace(r[0],"")}
r=/周(一|二|三|四|五|六|日|天)/.exec(title);if(r){var wd3={"一":1,"二":2,"三":3,"四":4,"五":5,"六":6,"日":0,"天":0};var tw3=wd3[r[1]];var cd3=d.getDay();var dd3=(7-cd3+tw3)%7;if(dd3===0)dd3=7;d.setDate(d.getDate()+dd3);title=title.replace(r[0],"")}
r=/(\d+)月(\d+)[号日]/.exec(title);if(r){d.setMonth(parseInt(r[1])-1);d.setDate(parseInt(r[2]));title=title.replace(r[0],"")}
function p(n){return n<10?"0"+n:n}
dateStr=d.getFullYear()+"-"+p(d.getMonth()+1)+"-"+p(d.getDate());
r=/(上午|下午|晚上|中午)?\s*(\d{1,2})点(\s*(半|(\d{1,2})分))?\s*(到|-|至)\s*(上午|下午|晚上|中午)?\s*(\d{1,2})点(\s*(半|(\d{1,2})分))?/.exec(title);
if(r){
var h1=parseInt(r[2]),h2=parseInt(r[8]);var ap1=r[1]||"",ap2=r[7]||"";
function to24(h,ap){if(ap==="下午"||ap==="晚上"){if(h<12)h+=12}else if(ap==="中午"&&h<12)h+=12;else if(ap==="上午"&&h===12)h=0;return h}
h1=to24(h1,ap1||(h2>h1&&!ap2?"":(h1>=8?"上午":"下午")));h2=to24(h2,ap2||(h2<h1?"下午":""));
timeStart=p(h1)+":"+p(r[5]?parseInt(r[5]):0);timeEnd=p(h2)+":"+p(r[11]?parseInt(r[11]):0);
title=title.replace(r[0],"");
}else{
r=/(上午|下午|晚上|中午)?\s*(\d{1,2})点(\s*(半|(\d{1,2})分))?/.exec(title);
if(r){var h=parseInt(r[2]);var ap=r[1]||"";h=ap==="下午"||ap==="晚上"?h+12:ap==="中午"&&h<12?h+12:ap==="上午"&&h===12?0:h;timeStart=p(h)+":"+p(r[5]?parseInt(r[5]):0);title=title.replace(r[0],"")}
}
title=title.replace(/^\s+|\s+$/g,"").replace(/[,，。、\s]+$/,"");
if(!title)title="语音输入";
return{date:dateStr,timeStart:timeStart,timeEnd:timeEnd,title:title}
}
var SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;
var recognition=null,isListening=false;
if(SpeechRecognition){
recognition=new SpeechRecognition();recognition.lang="zh-CN";recognition.interimResults=false;recognition.continuous=false;
recognition.onresult=function(e){
var raw=e.results[0][0].transcript;
var parsed=parseVoiceDate(raw);
evtTitle.value=parsed.title;evtDate.value=parsed.date;
if(parsed.timeStart){evtAllDay.checked=false;timeRow.style.display="flex";evtTimeStart.value=parsed.timeStart;evtTimeEnd.value=parsed.timeEnd||parsed.timeStart}
else{evtAllDay.checked=false;timeRow.style.display="flex";evtTimeStart.value="09:00";evtTimeEnd.value="10:00"}
stopListening();showToast("语音识别完成："+raw.substring(0,20)+"...");
};
recognition.onerror=function(){stopListening();showToast("语音识别失败，请重试")};
recognition.onend=function(){stopListening()};
voiceBtn.addEventListener("click",function(){if(isListening){stopListening()}else{startListening()}})
}else{voiceBtn.classList.add("unsupported");voiceBtn.title="浏览器不支持语音识别"}
function startListening(){isListening=true;voiceBtn.classList.add("listening");voiceBtn.textContent="🔴";recognition.start()}
function stopListening(){isListening=false;voiceBtn.classList.remove("listening");voiceBtn.textContent="🎤";try{recognition.stop()}catch(e){}}
render();
</script>
</body>
</html>
