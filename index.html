<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>奥总的日程</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
background:#f0f4f8;color:#2d3436;min-height:100vh;padding:0
}
.calendar-container{width:100%;max-width:960px;background:#fff;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
@media(min-width:641px){
body{padding:24px 16px;display:flex;justify-content:center}
.calendar-container{border-radius:10px;box-shadow:0 2px 12px rgba(0,0,0,.06);min-height:auto}
}
/* Header */
.calendar-header{display:flex;align-items:center;justify-content:space-between;padding:12px 12px;border-bottom:1px solid #e8edf2;gap:6px;background:#fff}
.calendar-header h1{font-size:18px;font-weight:600;white-space:nowrap;color:#2d3436}
.nav-btns{display:flex;gap:4px;flex-shrink:0}
.nav-btns button{width:32px;height:32px;font-size:14px;border:1px solid #d5e0e8;border-radius:6px;background:#fff;cursor:pointer;color:#636e72}
.add-btn{height:32px;padding:0 10px;font-size:13px;color:#0984e3;border:1px solid #0984e3;border-radius:6px;background:#fff;cursor:pointer;font-weight:500;white-space:nowrap;flex-shrink:0}
button:hover{background:#f0f4f8}
.add-btn:hover{background:#e8f0fe}
@media(max-width:380px){
.calendar-header h1{font-size:16px}
.nav-btns button{width:28px;height:28px;font-size:12px}
.add-btn{height:28px;font-size:12px;padding:0 8px}
}

/* Weekdays */
.weekdays{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid #eee;background:#fff}
.weekdays div{text-align:center;padding:8px 2px;font-size:12px;font-weight:500;color:#b2bec3}
.weekdays div:first-child,.weekdays div:last-child{color:#e17055}

/* Days grid */
.days-grid{display:grid;grid-template-columns:repeat(7,1fr);grid-auto-rows:minmax(75px,auto)}
@media(min-width:641px){.days-grid{grid-auto-rows:minmax(100px,auto)}}

.day-cell{border-right:1px solid #edf2f7;border-bottom:1px solid #edf2f7;padding:3px 4px;display:flex;flex-direction:column;gap:1px;overflow:hidden}
.day-cell:nth-child(7n){border-right:none}
.day-cell.other-month{background:#fafbfc}.day-cell.other-month .day-num{color:#dfe6e9}
.day-cell.today{background:#fff8f0}
.day-cell.drag-over{background:#d4efdf;outline:2px dashed #27ae60}

.day-num{font-size:11px;font-weight:500;color:#636e72;flex-shrink:0;margin-bottom:1px}
.day-cell:nth-child(7n) .day-num,.day-cell:nth-child(7n+1) .day-num{color:#e17055}
.day-cell.other-month:nth-child(7n) .day-num,.day-cell.other-month:nth-child(7n+1) .day-num{color:#fab1a0}
@media(min-width:641px){.day-num{font-size:13px}}

.today-dot{display:inline-block;width:20px;height:20px;line-height:20px;text-align:center;background:#e17055;color:#fff;border-radius:50%;font-size:11px}
@media(min-width:641px){.today-dot{width:22px;height:22px;line-height:22px;font-size:12px}}

/* Events */
.event{font-size:10px;line-height:1.35;padding:2px 4px;border-radius:3px;cursor:pointer;position:relative;word-break:break-all;flex-shrink:0}
@media(min-width:641px){
.event{font-size:11px;padding:3px 6px;border-radius:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;word-break:normal}
}
.event:hover{box-shadow:0 1px 4px rgba(0,0,0,.1)}
.event.all-day{background:#d4efdf;color:#2d3436;border-left:2px solid #27ae60}
.event.timed{background:#fce4ec;color:#2d3436;border-left:2px solid #e17055}
@media(min-width:641px){.event.all-day,.event.timed{border-left-width:3px}}
.event.timed::before{content:'\25cf ';font-size:7px;vertical-align:middle}
.event .delete-icon{position:absolute;right:1px;top:1px;width:14px;height:14px;line-height:12px;text-align:center;border-radius:50%;background:rgba(0,0,0,.25);color:#fff;font-size:9px;display:none;cursor:pointer}
@media(min-width:641px){.event .delete-icon{right:4px;top:50%;transform:translateY(-50%)}}
.event:hover .delete-icon{display:block}.event .delete-icon:hover{background:rgba(200,0,0,.7)}

/* Legend & Hint */
/* Category colors */
.event.cat-sport{background:#fff9db;color:#2d3436;border-left:2px solid #f0c929}
.event.cat-work{background:#d4efdf;color:#2d3436;border-left:2px solid #27ae60}
.event.cat-study{background:#fce4ec;color:#2d3436;border-left:2px solid #e17055}
.legend{display:flex;gap:12px;padding:8px 12px;border-top:1px solid #e8edf2;font-size:11px;color:#636e72}
.legend-item{display:flex;align-items:center;gap:4px}
.legend-swatch{width:10px;height:10px;border-radius:2px}
.legend-swatch.all-day{background:#d4efdf;border-left:2px solid #27ae60}
.legend-swatch.timed{background:#fce4ec;border-left:2px solid #e17055}
.legend-swatch.cat-study{background:#fce4ec;border-left:2px solid #e17055}
.legend-swatch.cat-sport{background:#fff9db;border-left:2px solid #f0c929}
.legend-swatch.cat-work{background:#d4efdf;border-left:2px solid #27ae60}
.hint{padding:8px 12px;font-size:10px;color:#b2bec3;border-top:1px solid #e8edf2;line-height:1.5}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;justify-content:center;align-items:flex-end;padding:10px 0}
@media(min-width:641px){.modal-overlay{align-items:center}}
.modal-overlay.active{display:flex}
.modal{background:#fff;border-radius:16px 16px 0 0;padding:20px 16px 16px;width:100%;max-width:420px;max-height:85vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 -4px 24px rgba(0,0,0,.15)}
@media(min-width:641px){.modal{border-radius:10px;padding:24px 24px 20px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,.2)}}
.modal h3{font-size:16px;margin-bottom:14px;color:#2d3436}
.modal label{display:block;font-size:12px;color:#636e72;margin-bottom:3px}
.modal input,.modal select{width:100%;padding:10px;border:1px solid #d5e0e8;border-radius:6px;font-size:15px;margin-bottom:10px;font-family:inherit;background:#f8fafc;color:#2d3436}
.modal .checkbox-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.modal .checkbox-row input{width:auto;margin-bottom:0}
.modal .time-row{display:flex;gap:8px}
.modal .time-row input{flex:1;margin-bottom:0}
.modal-body{overflow-y:auto;flex:1;margin-bottom:8px}
.modal .btn-row{display:flex;gap:8px;margin-top:12px;flex-shrink:0;background:#fff;padding-top:8px;border-top:1px solid #e8edf2}
.modal .btn-row button{flex:1;padding:12px;border-radius:6px;font-size:15px;cursor:pointer;border:1px solid #d5e0e8;background:#fff;font-family:inherit;color:#2d3436}
.modal .btn-save{background:#1a56db;color:#fff;border-color:#1a56db}
.modal .btn-delete{background:#e17055;color:#fff;border-color:#e17055;font-weight:600}
.modal .btn-delete.hidden{display:none}

/* Title input with mic button */
.title-input-row{display:flex;gap:6px;align-items:center}
.title-input-row input{flex:1;margin-bottom:0}
.voice-btn{width:40px;height:40px;border-radius:50%;border:1px solid #d5e0e8;background:#f8fafc;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;color:#0984e3}
.voice-btn:hover{background:#e8f0fe;border-color:#0984e3}
.voice-btn.listening{background:#e17055;color:#fff;border-color:#e17055;animation:pulse .8s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(217,48,37,.4)}50%{box-shadow:0 0 0 8px rgba(217,48,37,0)}}
.voice-btn.unsupported{opacity:.4;cursor:not-allowed}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#2d3436;color:#fff;padding:10px 24px;border-radius:8px;font-size:14px;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>

<h3 id="modalTitle">新增事件</h3>

<label>标题</label><div class="title-input-row"><input type="text" id="evtTitle" placeholder="例如：开会"><button type="button" id="voiceBtn" class="voice-btn" title="语音输入">🎤</button></div>

<button id="btnCancel">取消</button>

</div>
</div></div>

</div>
<div class="hint">点击事件可编辑 · 悬停右侧 × 可删除 · 点击"+ 新增"添加事件</div>
</div>

function parseVoiceDate(text){
var d=new Date();var dateStr="";var timeStart="";var timeEnd="";var title=text;
// 日期解析
var r=/明天/.exec(title);if(r){d.setDate(d.getDate()+1);title=title.replace("明天","")}

r=/(\d+)月(\d+)[号日]/.exec(title);if(r){d.setMonth(parseInt(r[1])-1);d.setDate(parseInt(r[2]));title=title.replace(r[0],"")}
function p(n){return n<10?"0"+n:n}

// 时间解析
r=/(上午|下午|晚上|中午)?\s*(\d{1,2})点(\s*(半|(\d{1,2})分))?\s*(到|-|至)\s*(上午|下午|晚上|中午)?\s*(\d{1,2})点(\s*(半|(\d{1,2})分))?/.exec(title);
