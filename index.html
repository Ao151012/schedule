<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026年7月 日程表</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
background:#f5f5f5;color:#1a1a1a;min-height:100vh;padding:0
}
.calendar-container{width:100%;max-width:960px;background:#fff;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
@media(min-width:641px){
body{padding:24px 16px;display:flex;justify-content:center}
.calendar-container{border-radius:10px;box-shadow:0 1px 3px rgba(0,0,0,.08);min-height:auto}
}
/* Header */
.calendar-header{display:flex;align-items:center;justify-content:space-between;padding:12px 12px;border-bottom:1px solid #eee;gap:6px;background:#fff}
.calendar-header h1{font-size:18px;font-weight:600;white-space:nowrap}
.nav-btns{display:flex;gap:4px;flex-shrink:0}
.nav-btns button{width:32px;height:32px;font-size:14px;border:1px solid #ddd;border-radius:6px;background:#fff;cursor:pointer;color:#555}
.add-btn{height:32px;padding:0 10px;font-size:13px;color:#1a56db;border:1px solid #1a56db;border-radius:6px;background:#fff;cursor:pointer;font-weight:500;white-space:nowrap;flex-shrink:0}
button:hover{background:#f0f0f0}
.add-btn:hover{background:#e8f0fe}
@media(max-width:380px){
.calendar-header h1{font-size:16px}
.nav-btns button{width:28px;height:28px;font-size:12px}
.add-btn{height:28px;font-size:12px;padding:0 8px}
}

/* Weekdays */
.weekdays{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid #eee;background:#fff}
.weekdays div{text-align:center;padding:8px 2px;font-size:12px;font-weight:500;color:#888}
.weekdays div:first-child,.weekdays div:last-child{color:#c44}

/* Days grid */
.days-grid{display:grid;grid-template-columns:repeat(7,1fr);grid-auto-rows:minmax(75px,auto)}
@media(min-width:641px){.days-grid{grid-auto-rows:minmax(100px,auto)}}

.day-cell{border-right:1px solid #f0f0f0;border-bottom:1px solid #f0f0f0;padding:3px 4px;display:flex;flex-direction:column;gap:1px;overflow:hidden}
.day-cell:nth-child(7n){border-right:none}
.day-cell.other-month{background:#fafafa}.day-cell.other-month .day-num{color:#ccc}
.day-cell.today{background:#fef9e7}
.day-cell.drag-over{background:#e8f0fe;outline:2px dashed #1a56db}

.day-num{font-size:11px;font-weight:500;color:#333;flex-shrink:0;margin-bottom:1px}
.day-cell:nth-child(7n) .day-num,.day-cell:nth-child(7n+1) .day-num{color:#c44}
.day-cell.other-month:nth-child(7n) .day-num,.day-cell.other-month:nth-child(7n+1) .day-num{color:#e4b4b4}
@media(min-width:641px){.day-num{font-size:13px}}

.today-dot{display:inline-block;width:20px;height:20px;line-height:20px;text-align:center;background:#d93025;color:#fff;border-radius:50%;font-size:11px}
@media(min-width:641px){.today-dot{width:22px;height:22px;line-height:22px;font-size:12px}}

/* Events */
.event{font-size:10px;line-height:1.35;padding:2px 4px;border-radius:3px;cursor:pointer;position:relative;word-break:break-all;flex-shrink:0}
@media(min-width:641px){
.event{font-size:11px;padding:3px 6px;border-radius:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;word-break:normal}
}
.event:hover{box-shadow:0 1px 4px rgba(0,0,0,.2)}
.event.all-day{background:#e8f0fe;color:#1a56db;border-left:2px solid #1a56db}
.event.timed{background:#fce4ec;color:#c62828;border-left:2px solid #c62828}
@media(min-width:641px){.event.all-day,.event.timed{border-left-width:3px}}
.event.timed::before{content:'\25cf ';font-size:7px;vertical-align:middle}
.event .delete-icon{position:absolute;right:1px;top:1px;width:14px;height:14px;line-height:12px;text-align:center;border-radius:50%;background:rgba(0,0,0,.25);color:#fff;font-size:9px;display:none;cursor:pointer}
@media(min-width:641px){.event .delete-icon{right:4px;top:50%;transform:translateY(-50%)}}
.event:hover .delete-icon{display:block}.event .delete-icon:hover{background:rgba(200,0,0,.7)}

/* Legend & Hint */
.legend{display:flex;gap:12px;padding:8px 12px;border-top:1px solid #eee;font-size:11px;color:#666}
.legend-item{display:flex;align-items:center;gap:4px}
.legend-swatch{width:10px;height:10px;border-radius:2px}
.legend-swatch.all-day{background:#e8f0fe;border-left:2px solid #1a56db}
.legend-swatch.timed{background:#fce4ec;border-left:2px solid #c62828}
.hint{padding:8px 12px;font-size:10px;color:#999;border-top:1px solid #eee;line-height:1.5}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;justify-content:center;align-items:flex-end}
@media(min-width:641px){.modal-overlay{align-items:center}}
.modal-overlay.active{display:flex}
.modal{background:#fff;border-radius:16px 16px 0 0;padding:20px 16px;width:100%;max-width:420px;max-height:85vh;overflow-y:auto;box-shadow:0 -4px 24px rgba(0,0,0,.15)}
@media(min-width:641px){.modal{border-radius:10px;padding:24px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,.2)}}
.modal h3{font-size:16px;margin-bottom:14px}
.modal label{display:block;font-size:12px;color:#666;margin-bottom:3px}
.modal input,.modal select{width:100%;padding:10px;border:1px solid #ddd;border-radius:6px;font-size:15px;margin-bottom:10px;font-family:inherit}
.modal .checkbox-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.modal .checkbox-row input{width:auto;margin-bottom:0}
.modal .time-row{display:flex;gap:8px}
.modal .time-row input{flex:1;margin-bottom:0}
.modal .btn-row{display:flex;gap:8px;margin-top:14px}
.modal .btn-row button{flex:1;padding:12px;border-radius:6px;font-size:15px;cursor:pointer;border:1px solid #ddd;background:#fff;font-family:inherit}
.modal .btn-save{background:#1a56db;color:#fff;border-color:#1a56db}
.modal .btn-delete{background:#c62828;color:#fff;border-color:#c62828}
.modal .btn-delete.hidden{display:none}
</style>
</head>
<body>
<div class="modal-overlay" id="modal">
<div class="modal">
<h3 id="modalTitle">新增事件</h3>
<label>标题</label><input type="text" id="evtTitle" placeholder="例如：开会">
<label>日期</label><input type="date" id="evtDate">
<div class="checkbox-row"><input type="checkbox" id="evtAllDay"><label for="evtAllDay" style="margin:0">全天事件</label></div>
<div class="time-row" id="timeRow"><input type="time" id="evtTimeStart" value="09:00"><input type="time" id="evtTimeEnd" value="10:00"></div>
<div class="btn-row">
<button class="btn-delete hidden" id="btnDelete">删除</button>
<button id="btnCancel">取消</button>
<button class="btn-save" id="btnSave">保存</button>
</div>
</div></div>

<div class="calendar-container">
<div class="calendar-header">
<div class="nav-btns"><button id="prevBtn">&#9664;</button><button id="nextBtn">&#9654;</button></div>
<h1 id="monthTitle">2026年 7月</h1>
<button class="add-btn" id="addBtn">+ 新增</button>
</div>
<div class="weekdays"><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div><div>日</div></div>
<div class="days-grid" id="daysGrid"></div>
<div class="legend">
<div class="legend-item"><span class="legend-swatch all-day"></span> 全天</div>
<div class="legend-item"><span class="legend-swatch timed"></span> 定时</div>
</div>
<div class="hint">点击事件可编辑 · 悬停右侧 × 可删除 · 点击"+ 新增"添加事件</div>
</div>

<script>
var defaultEvents=[
{id:1,date:"2026-07-06",title:"述职答辩",allDay:false,time:"13:00-17:00"},
{id:2,date:"2026-07-06",title:"西语课",allDay:false,time:"19:00-20:00"},
{id:3,date:"2026-07-07",title:"完成注会作业",allDay:true,time:""},
{id:4,date:"2026-07-07",title:"完成开题答辩PPT",allDay:true,time:""},
{id:5,date:"2026-07-07",title:"普拉提",allDay:false,time:"18:00-19:00"},
{id:6,date:"2026-07-09",title:"普拉提",allDay:false,time:"18:30-19:30"},
{id:7,date:"2026-07-10",title:"注会作业",allDay:true,time:""},
{id:8,date:"2026-07-11",title:"香港账户整理",allDay:false,time:"9:00-13:00"},
{id:9,date:"2026-07-12",title:"开题答辩",allDay:true,time:""},
{id:10,date:"2026-07-16",title:"西安活动",allDay:true,time:""}
];
var events=[],stored=localStorage.getItem("schedule_events");
if(stored){events=JSON.parse(stored)}else{events=defaultEvents;localStorage.setItem("schedule_events",JSON.stringify(events))}
var nextId=events.length>0?Math.max.apply(null,events.map(function(e){return e.id}))+1:1;
function saveEvents(){localStorage.setItem("schedule_events",JSON.stringify(events))}
var eventMap={};
function buildMap(){eventMap={};events.forEach(function(e){if(!eventMap[e.date])eventMap[e.date]=[];eventMap[e.date].push(e)})}
var currentYear=2026,currentMonth=7;
var monthTitle=document.getElementById("monthTitle"),daysGrid=document.getElementById("daysGrid");
var modal=document.getElementById("modal"),modalTitle=document.getElementById("modalTitle");
var evtTitle=document.getElementById("evtTitle"),evtDate=document.getElementById("evtDate");
var evtAllDay=document.getElementById("evtAllDay"),timeRow=document.getElementById("timeRow");
var evtTimeStart=document.getElementById("evtTimeStart"),evtTimeEnd=document.getElementById("evtTimeEnd");
var btnDelete=document.getElementById("btnDelete"),btnSave=document.getElementById("btnSave");
var btnCancel=document.getElementById("btnCancel"),editingId=null;
function todayStr(){var d=new Date();function p(n){return n<10?"0"+n:n};return d.getFullYear()+"-"+p(d.getMonth()+1)+"-"+p(d.getDate())}
function render(){
buildMap();monthTitle.textContent=currentYear+"年 "+currentMonth+"月";daysGrid.innerHTML="";
var fd=new Date(currentYear,currentMonth-1,1),sd=fd.getDay()===0?7:fd.getDay();
var dim=new Date(currentYear,currentMonth,0).getDate(),dip=new Date(currentYear,currentMonth-1,0).getDate();
var td=todayStr();function pp(n){return n<10?"0"+n:n}
var i,d,m,y,ds;
for(i=sd-1;i>0;i--){d=dip-i+1;m=currentMonth===1?12:currentMonth-1;y=currentMonth===1?currentYear-1:currentYear;ds=y+"-"+pp(m)+"-"+pp(d);appendDay(d,ds,true)}
for(d=1;d<=dim;d++){ds=currentYear+"-"+pp(currentMonth)+"-"+pp(d);appendDay(d,ds,false)}
var tc=sd-1+dim,rm=tc%7===0?0:7-(tc%7),nm=currentMonth===12?1:currentMonth+1,ny=currentMonth===12?currentYear+1:currentYear;
for(d=1;d<=rm;d++){ds=ny+"-"+pp(nm)+"-"+pp(d);appendDay(d,ds,true)}
}
function appendDay(dn,ds,om){
var c=document.createElement("div");c.className="day-cell";if(om)c.classList.add("other-month");
if(ds===todayStr())c.classList.add("today");c.setAttribute("data-date",ds);
c.addEventListener("dragover",function(ev){ev.preventDefault();c.classList.add("drag-over")});
c.addEventListener("dragleave",function(){c.classList.remove("drag-over")});
c.addEventListener("drop",function(ev){c.classList.remove("drag-over");var id=parseInt(ev.dataTransfer.getData("text/plain"));var evt=events.find(function(e){return e.id===id});if(evt&&!om){evt.date=ds;saveEvents();render()}});
var ne=document.createElement("div");ne.className="day-num";
if(ds===todayStr()){var dot=document.createElement("span");dot.className="today-dot";dot.textContent=dn;ne.appendChild(dot)}else{ne.textContent=dn}
c.appendChild(ne);
var de=eventMap[ds]||[];de.forEach(function(ev){var el=document.createElement("div");
if(ev.allDay){el.className="event all-day";el.textContent=ev.title}else{el.className="event timed";el.textContent=ev.title+" "+ev.time}
el.setAttribute("data-id",ev.id);el.draggable=true;
el.addEventListener("dragstart",function(ev2){ev2.dataTransfer.setData("text/plain",ev.id.toString())});
el.addEventListener("click",function(e){e.stopPropagation();openEditModal(ev)});
var di=document.createElement("span");di.className="delete-icon";di.textContent="x";
di.addEventListener("click",function(e2){e2.stopPropagation();deleteEvent(ev.id)});el.appendChild(di);c.appendChild(el)});
daysGrid.appendChild(c)}
function openAddModal(ds){editingId=null;modalTitle.textContent="新增事件";evtTitle.value="";evtDate.value=ds||todayStr();evtAllDay.checked=false;evtTimeStart.value="09:00";evtTimeEnd.value="10:00";timeRow.style.display="flex";btnDelete.classList.add("hidden");modal.classList.add("active")}
function openEditModal(ev){editingId=ev.id;modalTitle.textContent="编辑事件";evtTitle.value=ev.title;evtDate.value=ev.date;evtAllDay.checked=ev.allDay;if(ev.allDay){timeRow.style.display="none";evtTimeStart.value="09:00";evtTimeEnd.value="10:00"}else{timeRow.style.display="flex";var p=ev.time?ev.time.split("-"):["09:00","10:00"];evtTimeStart.value=p[0]||"09:00";evtTimeEnd.value=p[1]||"10:00"}btnDelete.classList.remove("hidden");modal.classList.add("active")}
function saveEvent(){var t=evtTitle.value.trim();if(!t){alert("请输入事件标题");return}var dt=evtDate.value,ad=evtAllDay.checked,tm=ad?"":(evtTimeStart.value+"-"+evtTimeEnd.value);if(editingId){var ev=events.find(function(e){return e.id===editingId});if(ev){ev.title=t;ev.date=dt;ev.allDay=ad;ev.time=tm}}else{events.push({id:nextId++,date:dt,title:t,allDay:ad,time:tm})}saveEvents();closeModal();render()}
function deleteEvent(id){events=events.filter(function(e){return e.id!==id});saveEvents();render();closeModal()}
function closeModal(){modal.classList.remove("active");editingId=null}
evtAllDay.addEventListener("change",function(){timeRow.style.display=evtAllDay.checked?"none":"flex"});
btnSave.addEventListener("click",saveEvent);btnCancel.addEventListener("click",closeModal);
btnDelete.addEventListener("click",function(){if(editingId&&confirm("确定删除这个事件吗？")){deleteEvent(editingId)}});
modal.addEventListener("click",function(e){if(e.target===modal)closeModal()});
document.getElementById("addBtn").addEventListener("click",function(){openAddModal("")});
document.getElementById("prevBtn").addEventListener("click",function(){if(currentMonth===1){currentMonth=12;currentYear--}else{currentMonth--}render()});
document.getElementById("nextBtn").addEventListener("click",function(){if(currentMonth===12){currentMonth=1;currentYear++}else{currentMonth++}render()});
document.addEventListener("keydown",function(e){if(e.ctrlKey&&e.shiftKey&&e.key==="R"){if(confirm("恢复默认事件？")){events=defaultEvents;saveEvents();render()}}});
render();
</script>
</body>
</html>
